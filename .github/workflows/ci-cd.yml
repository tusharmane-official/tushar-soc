name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: Build & Test ──────────────────────────────
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t my-app:${{ github.sha }} .

      - name: Run tests inside container
        run: docker run --rm my-app:${{ github.sha }} pytest test_app.py -v

  # ── Job 2: Push to Docker Hub ────────────────────────
  push-image:
    needs: build-and-test          # only runs if tests pass
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/my-app:latest

  # ── Job 3: Deploy ────────────────────────────────────
  deploy:
    needs: push-image
    runs-on: ubuntu-latest

    steps:
      - name: Pull and run latest image
        run: |
          docker pull ${{ secrets.DOCKER_USERNAME }}/my-app:latest
          docker stop my-app-container || true
          docker rm my-app-container || true
          docker run -d --name my-app-container -p 5000:5000 \
            ${{ secrets.DOCKER_USERNAME }}/my-app:latest