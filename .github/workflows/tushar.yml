name: CI/CD Demo Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  #Job 1: Build & Test
  core3-build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ci-cd-demo:${{ github.sha }} .

      - name: Run tests inside container
        run: docker run --rm ci-cd-demo:${{ github.sha }} pytest test.py -v

  #Job 2: Push to Docker Hub
  core4-push-image:
    needs: core3-build-and-test          # only runs if tests pass
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/ci-cd-demo:1.0

  #Job 3: Deploy
  core5-bdce-deploy:
    needs: core4-push-image
    runs-on: ubuntu-latest

    steps:
      - name: Pull and run latest image
        run: |
          docker pull ${{ secrets.DOCKER_USERNAME }}/ci-cd-demo:1.0
          docker stop tushar-image || true
          docker rm tushar-image || true
          docker run -d --name tushar-image -p 5000:5000 \
            ${{ secrets.DOCKER_USERNAME }}/ci-cd-demo:1.0